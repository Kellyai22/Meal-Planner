const emptyWeek=()=>DAYS.reduce((a,d)=>{a[d.toLowerCase()]={breakfast:"",snack:"",lunch:"",dinner:""};return a;},{});

function todayName(){const d=new Date().getDay();return DAYS[d===0?6:d-1];}

function categorize(i=""){
  const t=i.toLowerCase();
  if(/(chicken|beef|mince|pork|lamb|bacon|turkey|ham|salami|steak)/.test(t))return"🥩 Meat";
  if(/(salmon|tuna|fish|barramundi|snapper|seafood)/.test(t))return"🐟 Fish";
  if(/(milk|yoghurt|cheese|butter|cream|egg|feta|parmesan|brie|cheddar)/.test(t))return"🧀 Dairy & Eggs";
  if(/(spinach|tomato|capsicum|broccoli|onion|garlic|potato|carrot|bean|lettuce|avocado|cucumber|cabbage|spring onion|mushroom)/.test(t))return"🥬 Vegetables";
  if(/(banana|apple|berry|berries|mango|lemon|lime|fruit)/.test(t))return"🍎 Fruit";
  if(/(frozen)/.test(t))return"❄️ Frozen";
  if(/(nut|macadamia|peanut|chocolate|cracker|rice cake|granola|peanut butter)/.test(t))return"🥜 Snacks";
  if(/(coke|soda|water|juice|tea|red bull|drink)/.test(t))return"🥤 Drinks";
  return"🧂 Pantry";
}

// ── API ──────────────────────────────────────────────────────────
async function callClaude(prompt,apiKey,useSearch=false){
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]};
  if(useSearch)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify(body)
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API error");}
  const data=await res.json();
  return data.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}

// ── Setup Screen ─────────────────────────────────────────────────
function SetupScreen({onDone}){
  const [key,setKey]=useState("");
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState("");
  const test=async()=>{
    if(!key.trim())return;
    setTesting(true);setErr("");
    try{
      await callClaude("Say 'OK' and nothing else.",key.trim());
      save("mp_apikey",key.trim());
      onDone(key.trim());
    }catch(e){setErr("Key didn't work: "+e.message);}
    setTesting(false);
  };
  return(
    <div style={{minHeight:"100vh",background:CREAM,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{maxWidth:"400px",width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{fontSize:"56px",marginBottom:"12px"}}>🍽️</div>
          <h1 style={{color:DARK,fontSize:"26px",fontWeight:"bold",marginBottom:"6px"}}>Meal Planner</h1>
          <p style={{color:MED,fontFamily:"sans-serif",fontSize:"14px"}}>Protein-first · Strategic · Zero waste</p>
        </div>
        <div style={{background:"#FFF",borderRadius:"20px",padding:"24px",border:`1px solid ${LIGHT}`,boxShadow:"0 2px 16px rgba(61,46,38,0.08)"}}>
          <h2 style={{color:DARK,fontFamily:"sans-serif",fontSize:"16px",fontWeight:"700",marginBottom:"8px"}}>One-time setup</h2>
          <p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",lineHeight:"1.6",marginBottom:"16px"}}>
            This app uses Claude AI for recipe extraction and smart meal planning. You need a free Anthropic API key — it's pay-as-you-go and very cheap for personal use (typically less than $1/month).
          </p>
          <p style={{color:TC,fontFamily:"sans-serif",fontSize:"12px",fontWeight:"600",marginBottom:"4px",letterSpacing:"0.05em",textTransform:"uppercase"}}>Get your key:</p>
          <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",lineHeight:"1.6",marginBottom:"16px"}}>
            1. Go to <strong style={{color:DARK}}>console.anthropic.com</strong><br/>
            2. Sign up → API Keys → Create Key<br/>
            3. Copy and paste it below
          </p>
          <input
            type="password"
            value={key}
            onChange={e=>{setKey(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&test()}
            placeholder="sk-ant-..."
            style={{width:"100%",border:`1px solid ${LIGHT}`,borderRadius:"12px",padding:"12px 14px",
              color:DARK,fontSize:"14px",fontFamily:"sans-serif",outline:"none",marginBottom:"12px"}}
          />
          {err&&<p style={{color:"#991B1B",fontFamily:"sans-serif",fontSize:"13px",marginBottom:"12px"}}>{err}</p>}
          <button onClick={test} disabled={!key.trim()||testing}
            style={{width:"100%",background:key.trim()&&!testing?TC:"#EAE5DF",color:key.trim()&&!testing?"#FAF7F2":MED,
              borderRadius:"12px",padding:"14px",fontFamily:"sans-serif",fontSize:"15px",fontWeight:"700",cursor:key.trim()&&!testing?"pointer":"default"}}>
            {testing?"Testing…":"Save & Start"}
          </button>
          <p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px",marginTop:"12px",textAlign:"center",lineHeight:"1.5"}}>
            🔒 Your key is stored only on this device. Never shared.
          </p>
        </div>
      </div>
    </div>
  );
}

  const [pickMeal,setPickMeal]=useState(null);
  const [showPlanner,setShowPlanner]=useState(false);

  const saveRecipes=r=>{setRecipes(r);save("mp_recipes_v3",r);};
  const saveWeekPlan=w=>{setWeekPlan(w);save("mp_weekplan_v3",w);};

  const today=todayName();
  const getR=id=>recipes.find(r=>r.id===id);
  const getMealVal=(day,meal)=>weekPlan[day.toLowerCase()]?.[meal]||"";
  const setMeal=(day,meal,val)=>{
    const w={...weekPlan,[day.toLowerCase()]:{...weekPlan[day.toLowerCase()],[meal]:val}};
    saveWeekPlan(w);
  };

  if(!apiKey)return<SetupScreen onDone={k=>setApiKey(k)}/>;

  const navItems=[{id:"today",e:"☀️",l:"Today"},{id:"week",e:"📅",l:"Week"},{id:"recipes",e:"📖",l:"Recipes"},{id:"add",e:"➕",l:"Add"},{id:"shop",e:"🛒",l:"Shop"}];

  return(
    <div style={{background:CREAM,minHeight:"100vh",paddingBottom:"72px"}}>
      {/* Header */}
      <div style={{background:DARK,padding:"14px 20px 14px",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:"600px",margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <h1 style={{color:"#FAF7F2",fontSize:"20px",fontWeight:"bold",letterSpacing:"0.02em"}}>Meal Planner</h1>
            <p style={{color:MED,fontFamily:"sans-serif",fontSize:"10px",letterSpacing:"0.07em",textTransform:"uppercase",marginTop:"2px"}}>Protein-first · Strategic · Zero waste</p>
          </div>
          <span style={{fontSize:"28px"}}>🥗</span>
        </div>
      </div>

      <div style={{maxWidth:"600px",margin:"0 auto"}}>
        {tab==="today"&&<TodayView today={today} weekPlan={weekPlan} recipes={recipes} onViewRecipe={setViewRecipe} onPickMeal={setPickMeal}/>}
        {tab==="week"&&<WeekView weekPlan={weekPlan} recipes={recipes} today={today} onPickMeal={setPickMeal} onViewRecipe={setViewRecipe} onShowPlanner={()=>setShowPlanner(true)}/>}
        {tab==="recipes"&&<RecipesView recipes={recipes} onViewRecipe={setViewRecipe}/>}
        {tab==="add"&&<AddRecipeView recipes={recipes} apiKey={apiKey} onSave={saveRecipes}/>}
        {tab==="shop"&&<ShoppingView weekPlan={weekPlan} recipes={recipes}/>}
      </div>

      {/* Bottom nav */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#FFFFFF",borderTop:`1px solid ${LIGHT}`,zIndex:10}}>
        <div style={{maxWidth:"600px",margin:"0 auto",display:"flex"}}>
          {navItems.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"10px 0 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",
                color:tab===t.id?TC:MED,border:"none",background:"none",cursor:"pointer"}}>
              <span style={{fontSize:"20px"}}>{t.e}</span>
              <span style={{fontFamily:"sans-serif",fontSize:"9px",letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:tab===t.id?"700":"400"}}>{t.l}</span>
            </button>
          ))}
        </div>
      </nav>

      {viewRecipe&&<RecipeModal recipe={viewRecipe} onClose={()=>setViewRecipe(null)}/>}
      {pickMeal&&<MealPickerModal day={pickMeal.day} meal={pickMeal.meal} recipes={recipes}
        currentVal={getMealVal(pickMeal.day,pickMeal.meal)}
        onSelect={v=>{setMeal(pickMeal.day,pickMeal.meal,v);setPickMeal(null);}}
        onClose={()=>setPickMeal(null)}/>}
      {showPlanner&&<AIPlannerModal recipes={recipes} apiKey={apiKey}
        onApply={plan=>{saveWeekPlan(plan);setShowPlanner(false);setTab("week");}}
        onClose={()=>setShowPlanner(false)}/>}
    </div>
  );
}

// ── Today View ───────────────────────────────────────────────────

    <div style={{padding:"16px"}}>

// ── Recipes View ─────────────────────────────────────────────────
function RecipesView({recipes,onViewRecipe}){
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const filters=["all","breakfast","lunch","dinner","quick","fish","chicken","eggs","weekend"];
  const filtered=recipes.filter(r=>{
    const q=search.toLowerCase();
    const ms=!q||r.name.toLowerCase().includes(q)||r.tags?.some(t=>t.includes(q));
    const mf=filter==="all"||r.tags?.includes(filter);
    return ms&&mf;
  });
  const getE=r=>{
    if(r.tags?.includes("breakfast"))return"🍳";
    if(r.tags?.includes("lunch"))return"🥗";
    if(r.tags?.includes("dinner"))return"🍽️";
    return"🥜";
  };
  return(
    <div style={{padding:"16px"}}>
      <h2 style={{color:DARK,fontSize:"24px",fontWeight:"bold",marginBottom:"12px"}}>Recipe Library</h2>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search recipes..."
        style={{width:"100%",borderRadius:"12px",padding:"12px 16px",border:`1px solid ${LIGHT}`,background:"#FFF",
          color:DARK,fontFamily:"sans-serif",fontSize:"14px",outline:"none",marginBottom:"12px"}}/>
      <div style={{display:"flex",gap:"8px",marginBottom:"16px",overflowX:"auto",paddingBottom:"4px"}}>
        {filters.map(f=>(
          <button key={f} onClick={()=>setFilter(f)}
            style={{padding:"6px 14px",borderRadius:"20px",flexShrink:0,textTransform:"capitalize",cursor:"pointer",
              background:filter===f?TC:"#FFF",color:filter===f?"#FAF7F2":MED,
              border:`1px solid ${filter===f?TC:LIGHT}`,fontFamily:"sans-serif",fontSize:"12px"}}>
            {f}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
        {filtered.map(r=>(
          <div key={r.id} onClick={()=>onViewRecipe(r)}
            style={{borderRadius:"18px",padding:"14px",cursor:"pointer",background:"#FFF",border:`1px solid ${LIGHT}`,boxShadow:"0 1px 6px rgba(61,46,38,0.05)"}}>
            <div style={{fontSize:"24px",marginBottom:"8px"}}>{getE(r)}</div>
            <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600",marginBottom:"4px",lineHeight:"1.3"}}>{r.name}</p>
            <p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px"}}>{r.prep}m prep · Serves {r.serves}</p>
            {r.notes?.startsWith("⭐")&&<p style={{color:TC,fontFamily:"sans-serif",fontSize:"10px",marginTop:"6px"}}>⭐ Strategic</p>}
          </div>
        ))}
      </div>
      {filtered.length===0&&<p style={{color:MED,fontFamily:"sans-serif",textAlign:"center",padding:"32px"}}>No recipes found</p>}
    </div>
  );
}

// ── Add Recipe View ──────────────────────────────────────────────
function AddRecipeView({recipes,apiKey,onSave}){
  const [mode,setMode]=useState("url");
  const [url,setUrl]=useState("");
  const [loading,setLoading]=useState(false);
  const [extracted,setExtracted]=useState(null);
  const [err,setErr]=useState("");
  const [saved,setSaved]=useState(false);
  const [m,setM]=useState({name:"",tags:"",prep:"",cook:"",serves:"1",ingredients:"",steps:"",notes:""});

  const extract=async()=>{
    if(!url.trim())return;
    setLoading(true);setErr("");setExtracted(null);
    try{
      const text=await callClaude(`Fetch and extract the recipe from this URL: ${url}

Return ONLY raw JSON, no markdown:
{"name":"","prep":"10","cook":"20","serves":4,"ingredients":[{"q":"2 cups","u":"","i":"flour"}],"steps":["Step 1."],"tags":["dinner"],"notes":""}

If you can't access the URL, search for the recipe by name and extract it.`,apiKey,true);
      const c=text.replace(/\`\`\`json|\`\`\`/g,"").trim();
      const j=JSON.parse(c.slice(c.indexOf("{"),c.lastIndexOf("}")+1));
      setExtracted({...j,id:`r${Date.now()}`,url});
    }catch(e){setErr("Couldn't extract automatically. Try manual entry, or check the URL is a recipe page.");}
    setLoading(false);
  };

  const saveExtracted=async()=>{
    await onSave([...recipes,extracted]);
    setSaved(true);setExtracted(null);setUrl("");
    setTimeout(()=>setSaved(false),3000);
  };

  const saveManual=async()=>{
    if(!m.name.trim())return;
    const r={id:`r${Date.now()}`,name:m.name.trim(),
      tags:m.tags.split(",").map(t=>t.trim()).filter(Boolean),
      prep:m.prep,cook:m.cook,serves:parseInt(m.serves)||1,
      ingredients:m.ingredients.split("\n").filter(l=>l.trim()).map(line=>{
        const mt=line.trim().match(/^([\d½¼¾]+\s*(?:tbsp|tsp|cups?|g|kg|ml|bunch|handful|tin|cloves?|rashers?|slices?)?\s*)(.*)/i);
        return mt?{q:mt[1].trim(),u:"",i:mt[2].trim()}:{q:"",u:"",i:line.trim()};
      }),
      steps:m.steps.split("\n").filter(l=>l.trim()),notes:m.notes,url:""};
    await onSave([...recipes,r]);
    setSaved(true);setM({name:"",tags:"",prep:"",cook:"",serves:"1",ingredients:"",steps:"",notes:""});
    setTimeout(()=>setSaved(false),3000);
  };

  const inp={border:`1px solid ${LIGHT}`,borderRadius:"12px",padding:"10px 14px",color:DARK,
    fontFamily:"sans-serif",fontSize:"14px",outline:"none",width:"100%",display:"block"};

  return(
    <div style={{padding:"16px"}}>
      <h2 style={{color:DARK,fontSize:"24px",fontWeight:"bold",marginBottom:"4px"}}>Add a Recipe</h2>
      <p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",marginBottom:"16px"}}>Drop a URL from Nicole's site or anywhere — AI extracts it for you.</p>
      {saved&&<div style={{background:"#F0FAF4",border:"1px solid #B2DFCC",color:"#1A5C3C",borderRadius:"12px",padding:"12px 16px",fontFamily:"sans-serif",fontSize:"13px",marginBottom:"16px"}}>✅ Recipe saved to your library!</div>}
      <div style={{display:"flex",gap:"8px",marginBottom:"20px"}}>
        {["url","manual"].map(md=>(
          <button key={md} onClick={()=>setMode(md)}
            style={{flex:1,padding:"10px",borderRadius:"20px",fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600",cursor:"pointer",
              background:mode===md?TC:"#FFF",color:mode===md?"#FAF7F2":MED,border:`1px solid ${mode===md?TC:LIGHT}`}}>
            {md==="url"?"🔗 From URL":"✏️ Manual"}
          </button>
        ))}
      </div>

      {mode==="url"&&(
        <div>
          <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
            <input value={url} onChange={e=>{setUrl(e.target.value);setErr("");}} placeholder="Paste recipe URL here..."
              style={{...inp,flex:1,borderRadius:"12px 0 0 12px",borderRight:"none",width:"auto"}}/>
            <button onClick={extract} disabled={loading||!url.trim()}
              style={{background:loading||!url.trim()?"#EAE5DF":TC,color:"#FAF7F2",borderRadius:"0 12px 12px 0",
                padding:"10px 18px",fontFamily:"sans-serif",fontSize:"13px",cursor:loading||!url.trim()?"default":"pointer",flexShrink:0,border:"none"}}>
              {loading?"⏳":"Extract"}
            </button>
          </div>
          {loading&&<div style={{borderRadius:"16px",padding:"20px",textAlign:"center",background:CLIGHT,border:`1px solid ${LIGHT}`}}>
            <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"14px",fontWeight:"600"}}>🔍 Fetching recipe...</p>
            <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginTop:"4px"}}>Takes about 15–20 seconds</p>
          </div>}
          {err&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",color:"#991B1B",borderRadius:"12px",padding:"12px 16px",fontFamily:"sans-serif",fontSize:"13px"}}>{err}</div>}
          {extracted&&(
            <div style={{borderRadius:"18px",overflow:"hidden",border:"1px solid #B2DFCC"}}>
              <div style={{padding:"12px 16px",background:"#F0FAF4",borderBottom:"1px solid #B2DFCC"}}>
                <p style={{color:"#1A5C3C",fontFamily:"sans-serif",fontSize:"12px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.06em"}}>✅ Extracted</p>
              </div>
              <div style={{padding:"16px",background:"#FFF"}}>
                <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"15px",fontWeight:"700",marginBottom:"4px"}}>{extracted.name}</p>
                <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginBottom:"12px"}}>{extracted.prep}m prep · Serves {extracted.serves}</p>
                {extracted.ingredients?.slice(0,4).map((ing,i)=>(
                  <p key={i} style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px"}}>• {ing.q} {ing.u} {ing.i}</p>
                ))}
                {extracted.ingredients?.length>4&&<p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px"}}>+{extracted.ingredients.length-4} more...</p>}
                <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
                  <button onClick={saveExtracted}
                    style={{flex:1,padding:"10px",borderRadius:"20px",background:TC,color:"#FAF7F2",fontFamily:"sans-serif",fontSize:"13px",fontWeight:"700",cursor:"pointer",border:"none"}}>
                    Save to Library
                  </button>
                  <button onClick={()=>setExtracted(null)}
                    style={{padding:"10px 20px",borderRadius:"20px",border:`1px solid ${LIGHT}`,color:MED,fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer",background:"none"}}>
                    Discard
                  </button>
                </div>
              </div>
            </div>
          )}
          <div style={{marginTop:"16px",borderRadius:"12px",padding:"12px 16px",background:CLIGHT,border:`1px solid ${LIGHT}`}}>
            <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"12px",fontWeight:"600",marginBottom:"4px"}}>Works great with:</p>
            <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px"}}>Simple Home Edits, RecipeTin Eats, Taste.com.au, BBC Good Food, Delicious.com.au</p>
          </div>
        </div>
      )}

      {mode==="manual"&&(
        <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          <input value={m.name} onChange={e=>setM({...m,name:e.target.value})} placeholder="Recipe name *" style={inp}/>
          <div style={{display:"flex",gap:"8px"}}>
            <input value={m.prep} onChange={e=>setM({...m,prep:e.target.value})} placeholder="Prep mins" style={{...inp,flex:1,width:"auto"}}/>
            <input value={m.cook} onChange={e=>setM({...m,cook:e.target.value})} placeholder="Cook mins" style={{...inp,flex:1,width:"auto"}}/>
            <input value={m.serves} onChange={e=>setM({...m,serves:e.target.value})} placeholder="Serves" style={{...inp,width:"70px"}}/>
          </div>
          <input value={m.tags} onChange={e=>setM({...m,tags:e.target.value})} placeholder="Tags: dinner, chicken, quick" style={inp}/>
          <textarea value={m.ingredients} onChange={e=>setM({...m,ingredients:e.target.value})}
            placeholder={"Ingredients — one per line:\n2 chicken breasts\n1 tbsp olive oil"} rows={5}
            style={{...inp,resize:"none"}}/>
          <textarea value={m.steps} onChange={e=>setM({...m,steps:e.target.value})}
            placeholder={"Steps — one per line:\nPreheat oven to 180°C.\nSeason the chicken."} rows={5}
            style={{...inp,resize:"none"}}/>
          <textarea value={m.notes} onChange={e=>setM({...m,notes:e.target.value})}
            placeholder="Notes or tips (add ⭐ if it's a strategic leftover recipe)" rows={2}
            style={{...inp,resize:"none"}}/>
          <button onClick={saveManual} disabled={!m.name.trim()}
            style={{padding:"14px",borderRadius:"12px",background:m.name.trim()?TC:"#EAE5DF",color:m.name.trim()?"#FAF7F2":MED,
              fontFamily:"sans-serif",fontSize:"15px",fontWeight:"700",cursor:m.name.trim()?"pointer":"default",border:"none"}}>
            Save Recipe
          </button>
        </div>
      )}
    </div>
  );
}

// ── Shopping View ────────────────────────────────────────────────
function ShoppingView({weekPlan,recipes}){
  const [checked,setChecked]=useState(()=>load("mp_checked_v3",{}));
  const [extra,setExtra]=useState("");
  const [extras,setExtras]=useState(()=>load("mp_extras_v3",[]));

  const toggle=k=>{const c={...checked,[k]:!checked[k]};setChecked(c);save("mp_checked_v3",c);};
  const addExtra=()=>{if(!extra.trim())return;const e=[...extras,extra.trim()];setExtras(e);save("mp_extras_v3",e);setExtra("");};
  const removeExtra=i=>{const e=extras.filter((_,idx)=>idx!==i);setExtras(e);save("mp_extras_v3",e);};

  const allItems=[];const seen=new Set();
  DAYS.forEach(day=>{
    const plan=weekPlan[day.toLowerCase()]||{};
    MEALS.forEach(meal=>{
      const val=plan[meal];if(!val)return;
      const r=recipes.find(r=>r.id===val);
      if(!r?.ingredients)return;
      r.ingredients.forEach(ing=>{
        const k=(ing.i||"").toLowerCase().trim();
        if(k&&!seen.has(k)){seen.add(k);allItems.push({key:k,label:`${ing.q||""} ${ing.u||""} ${ing.i||""}`.trim().replace(/\s+/g," "),cat:categorize(ing.i||"")});}
      });
    });
  });

  const staples=[
    {key:"greek-yoghurt",label:"Greek yoghurt, full fat (large tub)",cat:"🧀 Dairy & Eggs"},
    {key:"eggs-12",label:"Eggs × 12",cat:"🧀 Dairy & Eggs"},
    {key:"frozen-berries",label:"Frozen berries (large bag)",cat:"❄️ Frozen"},
    {key:"bananas-bunch",label:"Bananas (bunch — freeze ripe ones)",cat:"🍎 Fruit"},
    {key:"baby-spinach-lg",label:"Baby spinach (large bag)",cat:"🥬 Vegetables"},
    {key:"cherry-toms",label:"Cherry tomatoes (punnet)",cat:"🥬 Vegetables"},
    {key:"macadamias-jar",label:"Macadamias (bench jar)",cat:"🥜 Snacks"},
    {key:"peanuts-bag",label:"Peanuts",cat:"🥜 Snacks"},
    {key:"peanut-butter",label:"Peanut butter, natural",cat:"🥜 Snacks"},
    {key:"coke-zero",label:"Coke Zero (slab)",cat:"🥤 Drinks"},
    {key:"cheese-block",label:"Tasty/cheddar cheese (block)",cat:"🧀 Dairy & Eggs"},
    {key:"seeded-crackers",label:"Seeded crackers (box)",cat:"🥜 Snacks"},
    {key:"rice-cakes",label:"Rice cakes",cat:"🥜 Snacks"},
    {key:"boiled-eggs-ready",label:"Boil 4–5 eggs (Sunday prep ⭐)",cat:"🧀 Dairy & Eggs"},
  ];
  staples.forEach(s=>{if(!seen.has(s.key)){seen.add(s.key);allItems.push(s);}});
  extras.forEach((e,i)=>allItems.push({key:`x${i}`,label:e,cat:"🧂 Pantry",extra:true,extraIdx:i}));

  const cats={};
  allItems.forEach(item=>{if(!cats[item.cat])cats[item.cat]=[];cats[item.cat].push(item);});
  const total=allItems.length;const done=Object.values(checked).filter(Boolean).length;

  return(
    <div style={{padding:"16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
        <h2 style={{color:DARK,fontSize:"24px",fontWeight:"bold"}}>Shopping List</h2>
        <span style={{color:MED,fontFamily:"sans-serif",fontSize:"12px"}}>{done}/{total} done</span>
      </div>
      <p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",marginBottom:"12px"}}>From your week + weekly staples</p>
      <div style={{height:"6px",borderRadius:"4px",background:LIGHT,marginBottom:"16px",overflow:"hidden"}}>
        <div style={{width:`${total?done/total*100:0}%`,height:"100%",background:TC,borderRadius:"4px",transition:"width 0.3s"}}/>
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"20px"}}>
        <input value={extra} onChange={e=>setExtra(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addExtra()}
          placeholder="Add item..."
          style={{flex:1,border:`1px solid ${LIGHT}`,borderRadius:"12px 0 0 12px",padding:"10px 14px",color:DARK,fontFamily:"sans-serif",fontSize:"13px",outline:"none"}}/>
        <button onClick={addExtra}
          style={{background:TC,color:"#FAF7F2",borderRadius:"0 12px 12px 0",padding:"10px 18px",fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer",border:"none"}}>
          Add
        </button>
      </div>
      {Object.entries(cats).map(([cat,items])=>(
        <div key={cat} style={{marginBottom:"20px"}}>
          <h3 style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"8px"}}>{cat}</h3>
          <div style={{borderRadius:"18px",overflow:"hidden",background:"#FFF",border:`1px solid ${LIGHT}`}}>
            {items.map((item,i)=>(
              <div key={item.key} onClick={()=>!item.extra&&toggle(item.key)}
                style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 16px",cursor:"pointer",
                  borderBottom:i<items.length-1?`1px solid ${LIGHT}`:"none",background:checked[item.key]?CREAM:"#FFF"}}>
                <div onClick={()=>toggle(item.key)}
                  style={{width:"20px",height:"20px",borderRadius:"6px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",
                    border:`2px solid ${checked[item.key]?TC:LIGHT}`,background:checked[item.key]?TC:"transparent"}}>
                  {checked[item.key]&&<span style={{color:"#FFF",fontSize:"11px",fontWeight:"bold"}}>✓</span>}
                </div>
                <span style={{flex:1,color:checked[item.key]?MED:DARK,fontFamily:"sans-serif",fontSize:"13px",
                  textDecoration:checked[item.key]?"line-through":"none"}}>
                  {item.label}
                </span>
                {item.extra&&<button onClick={()=>removeExtra(item.extraIdx)}
                  style={{color:MED,fontSize:"16px",background:"none",border:"none",cursor:"pointer",padding:"0 4px"}}>×</button>}
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Recipe Modal ─────────────────────────────────────────────────

        style={{width:"100%",maxWidth:"600px",borderRadius:"24px 24px 0 0",background:"#FFF",maxHeight:"90vh",display:"flex",flexDirection:"column"}}>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"12px"}}>

              <div key={i} style={{display:"flex",gap:"12px",marginBottom:"12px"}}>

// ── Meal Picker Modal ────────────────────────────────────────────
function MealPickerModal({day,meal,recipes,currentVal,onSelect,onClose}){
  const [search,setSearch]=useState("");
  const [custom,setCustom]=useState("");
  const relTags={breakfast:["breakfast"],snack:[],lunch:["lunch","no-cook"],dinner:["dinner"]};
  const tags=relTags[meal]||[];
  const filtered=search
    ?recipes.filter(r=>r.name.toLowerCase().includes(search.toLowerCase())||r.tags?.some(t=>t.includes(search.toLowerCase())))
    :recipes.filter(r=>tags.length===0||r.tags?.some(t=>tags.includes(t)));

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:50,background:"rgba(61,46,38,0.5)",display:"flex",alignItems:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()}
        style={{width:"100%",maxWidth:"600px",margin:"0 auto",borderRadius:"24px 24px 0 0",background:"#FFF",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:"40px",height:"4px",borderRadius:"2px",background:LIGHT}}/>
        </div>
        <div style={{padding:"0 16px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
            <h3 style={{color:DARK,fontFamily:"sans-serif",fontWeight:"700"}}>{MEMOJI[meal]} {day} — {MLABEL[meal]}</h3>
            <button onClick={onClose} style={{color:MED,fontSize:"26px",background:"none",border:"none",cursor:"pointer"}}>×</button>
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search all recipes..."
            style={{width:"100%",border:`1px solid ${LIGHT}`,borderRadius:"12px",padding:"10px 14px",color:DARK,fontFamily:"sans-serif",fontSize:"13px",outline:"none",marginBottom:"8px"}}/>
          <div style={{display:"flex",gap:"8px"}}>
            <input value={custom} onChange={e=>setCustom(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&custom.trim()&&onSelect(custom.trim())}
              placeholder={meal==="snack"?"e.g. Macadamias & dark chocolate":"Or type a simple description"}
              style={{flex:1,border:`1px solid ${LIGHT}`,borderRadius:"12px 0 0 12px",padding:"8px 14px",color:DARK,fontFamily:"sans-serif",fontSize:"13px",outline:"none"}}/>
            <button onClick={()=>custom.trim()&&onSelect(custom.trim())} disabled={!custom.trim()}
              style={{background:custom.trim()?DARK:LIGHT,color:"#FFF",borderRadius:"0 12px 12px 0",padding:"8px 16px",fontFamily:"sans-serif",fontSize:"13px",cursor:custom.trim()?"pointer":"default",border:"none"}}>
              Save
            </button>
          </div>
        </div>
        <div className="scroll" style={{overflowY:"auto",flex:1,padding:"4px 16px 24px",display:"flex",flexDirection:"column",gap:"6px"}}>
          {currentVal&&<button onClick={()=>onSelect("")}
            style={{width:"100%",textAlign:"left",padding:"10px 16px",borderRadius:"12px",background:"#FEF2F2",border:"1px solid #FECACA",color:"#991B1B",fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer"}}>
            ✕ Remove meal
          </button>}
          {filtered.map(r=>(
            <button key={r.id} onClick={()=>onSelect(r.id)}
              style={{width:"100%",textAlign:"left",padding:"12px 16px",borderRadius:"12px",cursor:"pointer",
                background:currentVal===r.id?CLIGHT:"#FFF",border:`1px solid ${currentVal===r.id?TC:LIGHT}`}}>
              <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600"}}>{r.name}</p>
              <p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px"}}>{r.prep}m prep · Serves {r.serves}</p>
            </button>
          ))}
          {filtered.length===0&&<p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",textAlign:"center",padding:"16px"}}>No matching recipes. Add one in ➕ tab.</p>}
        </div>
      </div>
    </div>
  );
}

// ── AI Planner Modal ─────────────────────────────────────────────
function AIPlannerModal({recipes,apiKey,onApply,onClose}){
  const [mode,setMode]=useState("choose");
  const [selected,setSelected]=useState([]);
  const [loading,setLoading]=useState(false);
  const [plan,setPlan]=useState(null);
  const [reasoning,setReasoning]=useState("");
  const [err,setErr]=useState("");

  const dinners=recipes.filter(r=>r.tags?.includes("dinner"));
  const toggle=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);

  const generate=async()=>{
    setLoading(true);setPlan(null);setReasoning("");setErr("");
    const list=recipes.map(r=>({id:r.id,name:r.name,tags:r.tags||[],produces:r.produces||[],uses:r.uses||[]}));
    const prompt=`You are a strategic meal planner inspired by Nicole from Simple Home Edits. Plan meals to maximise ingredient reuse and minimise waste.

Available recipes: ${JSON.stringify(list)}

${mode==="choose"
  ?`User wants these dinners: ${selected.map(id=>recipes.find(r=>r.id===id)?.name).filter(Boolean).join(", ")}. Choose breakfasts, snacks and lunches to complement them.`
  :"Surprise the user with the best strategic week — maximise ingredient reuse."}

RULES:
- After coconut chicken curry (id:s9 — produces leftover rice), schedule egg fried rice (id:s10) within 1-2 days
- After roast chicken (id:s11 — produces leftover chicken), use chicken in wraps/lunch next day
- After slow cook (id:s14 — produces leftovers), plan a use-up meal
- Vary proteins — don't repeat same protein consecutive nights
- Snacks can be text like "Macadamias + cheese" or "Boiled egg + apple"
- Simple breakfasts can be text like "Smoothie — berries, banana, yoghurt"

Return ONLY raw JSON (no markdown):
{"plan":{"monday":{"breakfast":"id or text","snack":"text","lunch":"id or text","dinner":"id"},"tuesday":{"breakfast":"","snack":"","lunch":"","dinner":""},"wednesday":{"breakfast":"","snack":"","lunch":"","dinner":""},"thursday":{"breakfast":"","snack":"","lunch":"","dinner":""},"friday":{"breakfast":"","snack":"","lunch":"","dinner":""},"saturday":{"breakfast":"","snack":"","lunch":"","dinner":""},"sunday":{"breakfast":"","snack":"","lunch":"","dinner":""}},"reasoning":"2 sentences explaining your strategic ingredient reuse choices."}`;
    try{
      const text=await callClaude(prompt,apiKey);
      const c=text.replace(/\`\`\`json|\`\`\`/g,"").trim();
      const j=JSON.parse(c.slice(c.indexOf("{"),c.lastIndexOf("}")+1));
      setPlan(j.plan);setReasoning(j.reasoning||"");
    }catch(e){setErr("Couldn't generate — please try again.");}
    setLoading(false);
  };

  const getName=val=>{if(!val)return"—";const r=recipes.find(r=>r.id===val);return r?r.name:val;};

  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,zIndex:50,background:"rgba(61,46,38,0.5)",display:"flex",alignItems:"flex-end"}}>
      <div onClick={e=>e.stopPropagation()}
        style={{width:"100%",maxWidth:"600px",margin:"0 auto",borderRadius:"24px 24px 0 0",background:"#FFF",maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}>
          <div style={{width:"40px",height:"4px",borderRadius:"2px",background:LIGHT}}/>
        </div>
        <div style={{padding:"0 16px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
            <h3 style={{color:DARK,fontSize:"20px",fontWeight:"bold"}}>✨ AI Meal Planner</h3>
            <button onClick={onClose} style={{color:MED,fontSize:"26px",background:"none",border:"none",cursor:"pointer"}}>×</button>
          </div>
          <p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",marginBottom:"16px"}}>Plans your week to reuse ingredients — no more rotting food.</p>
          <div style={{display:"flex",gap:"8px"}}>
            {["choose","surprise"].map(md=>(
              <button key={md} onClick={()=>setMode(md)}
                style={{flex:1,padding:"10px",borderRadius:"20px",fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600",cursor:"pointer",
                  background:mode===md?TC:"#FFF",color:mode===md?"#FAF7F2":MED,border:`1px solid ${mode===md?TC:LIGHT}`}}>
                {md==="choose"?"I'll choose dinners":"🎲 Surprise me"}
              </button>
            ))}
          </div>
        </div>
        <div className="scroll" style={{overflowY:"auto",flex:1,padding:"0 16px 16px"}}>
          {mode==="choose"&&!plan&&!loading&&(
            <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
              <p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",marginBottom:"8px"}}>Pick the dinners you'd like this week:</p>
              {dinners.map(r=>(
                <button key={r.id} onClick={()=>toggle(r.id)}
                  style={{width:"100%",textAlign:"left",padding:"12px 16px",borderRadius:"12px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer",
                    background:selected.includes(r.id)?CLIGHT:"#FFF",border:`1px solid ${selected.includes(r.id)?TC:LIGHT}`}}>
                  <div style={{width:"20px",height:"20px",borderRadius:"6px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                    border:`2px solid ${selected.includes(r.id)?TC:LIGHT}`,background:selected.includes(r.id)?TC:"transparent"}}>
                    {selected.includes(r.id)&&<span style={{color:"#FFF",fontSize:"10px",fontWeight:"bold"}}>✓</span>}
                  </div>
                  <div>
                    <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600"}}>{r.name}</p>
                    <p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px"}}>{r.prep}m prep · Serves {r.serves}</p>
                  </div>
                </button>
              ))}
            </div>
          )}
          {loading&&<div style={{textAlign:"center",padding:"40px"}}>
            <div style={{fontSize:"40px",marginBottom:"12px"}}>🧠</div>
            <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"14px",fontWeight:"600"}}>Planning your week...</p>
            <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginTop:"4px"}}>Thinking about ingredient reuse & variety</p>
          </div>}
          {err&&<p style={{color:"#991B1B",fontFamily:"sans-serif",fontSize:"13px",textAlign:"center",padding:"16px"}}>{err}</p>}
          {plan&&!loading&&(
            <div>
              {reasoning&&<div style={{borderRadius:"16px",padding:"16px",background:CLIGHT,border:`1px solid ${LIGHT}`,marginBottom:"16px"}}>
                <p style={{color:TC,fontFamily:"sans-serif",fontSize:"11px",textTransform:"uppercase",fontWeight:"700",letterSpacing:"0.06em",marginBottom:"6px"}}>🧠 Strategy</p>
                <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",lineHeight:"1.6"}}>{reasoning}</p>
              </div>}
              <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"16px"}}>
                {DAYS.map(day=>{
                  const d=plan[day.toLowerCase()]||{};
                  return(
                    <div key={day} style={{borderRadius:"14px",padding:"12px 16px",background:"#FFF",border:`1px solid ${LIGHT}`}}>
                      <p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"700",marginBottom:"8px"}}>{day}</p>
                      {MEALS.map(meal=>(
                        <div key={meal} style={{display:"flex",gap:"8px",marginBottom:"4px"}}>
                          <span style={{color:MED,fontFamily:"sans-serif",fontSize:"11px",width:"60px",flexShrink:0}}>{MLABEL[meal]}</span>
                          <span style={{color:DARK,fontFamily:"sans-serif",fontSize:"12px",flex:1}}>{getName(d[meal])}</span>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>onApply(plan)}
                  style={{flex:1,padding:"14px",borderRadius:"20px",background:TC,color:"#FAF7F2",fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700",cursor:"pointer",border:"none"}}>
                  Apply This Plan ✓
                </button>
                <button onClick={()=>{setPlan(null);setReasoning("")}}
                  style={{padding:"14px 20px",borderRadius:"20px",border:`1px solid ${LIGHT}`,color:MED,fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer",background:"none"}}>
                  Retry
                </button>
              </div>
            </div>
          )}
        </div>
        {!plan&&!loading&&(
          <div style={{padding:"12px 16px 24px",borderTop:`1px solid ${LIGHT}`}}>
            <button onClick={generate} disabled={mode==="choose"&&selected.length===0}
              style={{width:"100%",padding:"14px",borderRadius:"20px",
                background:mode==="choose"&&selected.length===0?LIGHT:TC,
                color:mode==="choose"&&selected.length===0?MED:"#FAF7F2",
                fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700",
                cursor:mode==="choose"&&selected.length===0?"default":"pointer",border:"none"}}>
              {mode==="choose"?`Generate Plan${selected.length>0?` (${selected.length} dinners selected)`:""}`:"🎲 Generate My Week"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
