const categorize=(i="")=>{const t=i.toLowerCase();if(/(chicken|beef|mince|pork|lamb|bacon|turkey|ham|salami|steak)/.test(t))return"🥩 Meat";if(/(salmon|tuna|fish|barramundi|snapper)/.test(t))return"🐟 Fish";if(/(milk|yoghurt|cheese|butter|cream|egg|feta|parmesan|brie|cheddar)/.test(t))return"🧀 Dairy & Eggs";if(/(spinach|tomato|capsicum|broccoli|onion|garlic|potato|carrot|bean|lettuce|avocado|cucumber|cabbage|spring onion|mushroom|peas)/.test(t))return"🥬 Vegetables";if(/(banana|apple|berry|berries|mango|lemon|lime)/.test(t))return"🍎 Fruit";if(/frozen/.test(t))return"❄️ Frozen";if(/(nut|macadamia|peanut|chocolate|cracker|rice cake|granola|peanut butter)/.test(t))return"🥜 Snacks";if(/(coke|soda|water|juice|tea|red bull|drink)/.test(t))return"🥤 Drinks";return"🧂 Pantry";};

async function callClaude(prompt,apiKey,imageData=null){
  const content=imageData?[{type:"image",source:{type:"base64",media_type:imageData.type,data:imageData.data}},{type:"text",text:prompt}]:prompt;
  const body={model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content}]};
  if(!imageData)body.tools=[{type:"web_search_20250305",name:"web_search"}];
  let res;
  if(apiKey){res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});}
  else{res=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});}
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"API error");}
  const data=await res.json();
  return data.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
}

function SetupScreen({onDone}){
  const [key,setKey]=useState("");const [testing,setTesting]=useState(false);const [err,setErr]=useState("");const [mode,setMode]=useState("choose");
  const test=async()=>{if(!key.trim())return;setTesting(true);setErr("");try{await callClaude("Say OK.",key.trim());save("mp_apikey",key.trim());onDone(key.trim());}catch(e){setErr("Key didn't work — double check and try again.");}setTesting(false);};
  const skipSetup=async()=>{setTesting(true);setErr("");try{await callClaude("Say OK.","");save("mp_apikey","");onDone("");}catch(e){setErr("Something went wrong. Try using your own API key instead.");}setTesting(false);};
  return(<div style={{minHeight:"100dvh",background:CREAM,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
    <div style={{maxWidth:"380px",width:"100%"}}>
      <div style={{textAlign:"center",marginBottom:"28px"}}><div style={{fontSize:"52px",marginBottom:"10px"}}>🍽️</div><h1 style={{color:DARK,fontSize:"24px",fontWeight:"bold",marginBottom:"4px"}}>Meal Planner</h1><p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px"}}>Protein-first · Strategic · Zero waste</p></div>
      {mode==="choose"&&<div style={{background:"#FFF",borderRadius:"20px",padding:"22px",border:`1px solid ${LIGHT}`,boxShadow:"0 2px 16px rgba(61,46,38,0.08)"}}>
        <h2 style={{color:DARK,fontFamily:"sans-serif",fontSize:"15px",fontWeight:"700",marginBottom:"12px"}}>Get started</h2>
        <button onClick={skipSetup} disabled={testing} style={{width:"100%",background:TC,color:"#FAF7F2",borderRadius:"10px",padding:"15px",fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700",cursor:testing?"default":"pointer",border:"none",marginBottom:"10px"}}>{testing?"Connecting…":"Start — no setup needed"}</button>
        <button onClick={()=>setMode("byok")} style={{width:"100%",background:"none",color:MED,borderRadius:"10px",padding:"10px",fontFamily:"sans-serif",fontSize:"12px",cursor:"pointer",border:`1px solid ${LIGHT}`}}>I have my own Anthropic API key</button>
        {err&&<p style={{color:"#991B1B",fontFamily:"sans-serif",fontSize:"12px",marginTop:"10px"}}>{err}</p>}
      </div>}
      {mode==="byok"&&<div style={{background:"#FFF",borderRadius:"20px",padding:"22px",border:`1px solid ${LIGHT}`,boxShadow:"0 2px 16px rgba(61,46,38,0.08)"}}>
        <h2 style={{color:DARK,fontFamily:"sans-serif",fontSize:"15px",fontWeight:"700",marginBottom:"6px"}}>Enter your Anthropic API key</h2>
        <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",lineHeight:"1.6",marginBottom:"14px"}}>Go to <strong style={{color:DARK}}>console.anthropic.com</strong> → API Keys → copy your key.</p>
        <input type="password" value={key} onChange={e=>{setKey(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&test()} placeholder="sk-ant-..." style={{width:"100%",border:`1px solid ${LIGHT}`,borderRadius:"10px",padding:"12px 14px",color:DARK,fontSize:"14px",outline:"none",marginBottom:"10px",display:"block"}}/>
        {err&&<p style={{color:"#991B1B",fontFamily:"sans-serif",fontSize:"12px",marginBottom:"10px"}}>{err}</p>}
        <button onClick={test} disabled={!key.trim()||testing} style={{width:"100%",background:key.trim()&&!testing?TC:LIGHT,color:key.trim()&&!testing?"#FAF7F2":MED,borderRadius:"10px",padding:"13px",fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700",cursor:key.trim()&&!testing?"pointer":"default",border:"none",marginBottom:"8px"}}>{testing?"Testing…":"Save & Start"}</button>
        <button onClick={()=>setMode("choose")} style={{width:"100%",background:"none",color:MED,borderRadius:"10px",padding:"8px",fontFamily:"sans-serif",fontSize:"12px",cursor:"pointer",border:"none"}}>← Back</button>
        <p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px",marginTop:"6px",textAlign:"center"}}>🔒 Stored only on this device. Never shared.</p>

}

function SettingsModal({onClose,apiKey,onResetKey}){

          <div style={{display:"flex",gap:"3px",marginTop:"2px"}}>

    {activeDay===today&&!allPlanned&&(<button onClick={onShowPlanner} style={{width:"100%",borderRadius:"14px",padding:"13px 16px",marginBottom:"13px",display:"flex",alignItems:"center",justifyContent:"space-between",background:`linear-gradient(135deg,${TC},#A85A3A)`,border:"none",cursor:"pointer"}}>
      <div style={{textAlign:"left"}}><p style={{color:"#FAF7F2",fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700"}}>✨ Auto-plan my whole week</p><p style={{color:"rgba(250,247,242,0.75)",fontFamily:"sans-serif",fontSize:"12px",marginTop:"2px"}}>AI plans 7 days with smart ingredient reuse</p></div>
      <span style={{color:"#FAF7F2",fontSize:"20px"}}>→</span>
    </button>)}

    {MEALS.map(meal=>{
      const val=plan[meal]||"";const recipe=val?getR(val):null;const name=recipe?recipe.name:val;
      return(<div key={meal} style={{marginBottom:"10px",borderRadius:"14px",overflow:"hidden",background:"#FFF",border:`1px solid ${LIGHT}`,boxShadow:"0 1px 5px rgba(61,46,38,0.05)"}}>

        <div style={{padding:"11px 13px"}}>

          :(<button onClick={()=>onPickMeal({day:activeDay,meal})} style={{width:"100%",borderRadius:"10px",padding:"14px",textAlign:"center",border:`2px dashed ${LIGHT}`,color:MED,fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer",background:"none"}}>+ Plan {MLABEL[meal]}</button>)}

function RecipesView({recipes,onViewRecipe}){

  const filtered=recipes.filter(r=>{const q=search.toLowerCase();const ms=!q||r.name.toLowerCase().includes(q)||r.tags?.some(t=>t.includes(q));const mf=filter==="all"||r.tags?.includes(filter);return ms&&mf;}).slice().reverse();
  const getE=r=>{if(r.tags?.includes("breakfast"))return"🍳";if(r.tags?.includes("lunch"))return"🥗";if(r.tags?.includes("dinner"))return"🍽️";if(r.tags?.includes("dessert"))return"🍰";return"🥜";};

    <div style={{display:"flex",gap:"6px",marginBottom:"13px",overflowX:"auto",paddingBottom:"2px"}}>
      {filters.map(f=>(<button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 12px",borderRadius:"20px",flexShrink:0,textTransform:"capitalize",cursor:"pointer",background:filter===f?TC:"#FFF",color:filter===f?"#FAF7F2":MED,border:`1px solid ${filter===f?TC:LIGHT}`,fontFamily:"sans-serif",fontSize:"12px"}}>{f}</button>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
      {filtered.map(r=>(<div key={r.id} onClick={()=>onViewRecipe(r)} style={{borderRadius:"14px",padding:"12px",cursor:"pointer",background:"#FFF",border:`1px solid ${LIGHT}`,boxShadow:"0 1px 4px rgba(61,46,38,0.04)"}}>
        <div style={{fontSize:"21px",marginBottom:"6px"}}>{getE(r)}</div>

        <p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px"}}>{r.prep}m prep · Serves {r.serves}</p>
        <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginTop:"6px"}}>
          {r.produces?.length>0&&<span style={{background:"#FEF9E7",color:"#B7791F",borderRadius:"20px",padding:"3px 8px",fontFamily:"sans-serif",fontSize:"10px",fontWeight:"600"}}>♻️ Creates leftovers</span>}

  </div>);
}

function AddRecipeView({recipes,apiKey,onSave}){
  const [mode,setMode]=useState("url");const [url,setUrl]=useState("");const [loading,setLoading]=useState(false);const [extracted,setExtracted]=useState(null);const [err,setErr]=useState("");const [saved,setSaved]=useState(false);const [m,setM]=useState({name:"",tags:"",prep:"",cook:"",serves:"1",ingredients:"",steps:"",notes:""});const photoRef=useRef();const [pasteText,setPasteText]=useState("");
  const EPROMPT=`Extract this recipe and return ONLY raw JSON (no markdown):\n{"name":"","prep":"10","cook":"20","serves":4,"ingredients":[{"q":"2 cups","u":"","i":"flour"}],"steps":["Step 1."],"tags":["dinner or breakfast or snack or lunch or dessert"],"notes":""}\nIf you cannot access the URL directly, search the web for the recipe by name or description. If you find it elsewhere, extract from there. If you truly cannot find the recipe, respond with: {"error":"not_found"}`;
  const parseJSON=text=>{const c=text.replace(/\`\`\`json|\`\`\`/g,"").trim();return JSON.parse(c.slice(c.indexOf("{"),c.lastIndexOf("}")+1));};
  const extractViaSocial=async(targetUrl)=>{
    const startRes=await fetch("/api/social-extract",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url:targetUrl})});
    if(!startRes.ok){const e=await startRes.json().catch(()=>({}));throw new Error(e.error||"Failed to start extraction");}
    const{runId,datasetId}=await startRes.json();
    if(!runId)throw new Error("No run ID");
    let result=null;
    for(let i=0;i<40;i++){
      await new Promise(r=>setTimeout(r,3000));
      const pollRes=await fetch(`/api/social-status?runId=${runId}&datasetId=${datasetId||""}`);
      const poll=await pollRes.json();
      if(poll.status==="done"){result=poll;break;}
      if(poll.status==="failed")throw new Error(poll.error||"Extraction failed");
    }
    if(!result)throw new Error("Timed out waiting for results");
    const t=await callClaude(`${EPROMPT}\n\nHere is recipe text from a social media post:\n\n${result.recipeText}`,apiKey);
    return parseJSON(t);
  };
  const extract=async()=>{if(!url.trim())return;setLoading(true);setErr("");setExtracted(null);try{if(isSocialMediaUrl(url)){const data=await extractViaSocial(url);if(data&&data.name){setExtracted({...data,id:`r${Date.now()}`,url});}else{setErr("social_failed");}setLoading(false);return;}const t=await callClaude(`${EPROMPT}\n\nURL: ${url}`,apiKey);const parsed=parseJSON(t);if(parsed.error==="not_found"){setErr("Couldn't find that recipe. Try 📋 Paste mode or 📷 Photo mode instead.");}else{setExtracted({...parsed,id:`r${Date.now()}`,url});}}catch{setErr("Couldn't extract automatically. Try 📋 Paste mode or ✏️ Manual entry.");}setLoading(false);};
  const extractPhoto=async(file)=>{setLoading(true);setErr("");setExtracted(null);try{const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});const t=await callClaude(`Look at this recipe image. ${EPROMPT}`,apiKey,{type:file.type||"image/jpeg",data:b64});setExtracted({...parseJSON(t),id:`r${Date.now()}`,url:""});}catch{setErr("Couldn't read the photo. Make sure the recipe is clear and well-lit.");}setLoading(false);};
  const extractPaste=async()=>{if(!pasteText.trim())return;setLoading(true);setErr("");setExtracted(null);try{const t=await callClaude(`${EPROMPT}\n\nHere is recipe text copied from social media or a website. Extract the recipe:\n\n${pasteText}`,apiKey);const parsed=parseJSON(t);if(parsed.error==="not_found"){setErr("Couldn't find a recipe in that text. Check you've pasted the full recipe.");}else{setExtracted({...parsed,id:`r${Date.now()}`,url:""});}}catch{setErr("Couldn't extract a recipe from that text. Check you've pasted the full recipe.");}setLoading(false);};
  const saveEx=()=>{onSave([...recipes,extracted]);setSaved(true);setExtracted(null);setUrl("");setTimeout(()=>setSaved(false),3000);};
  const saveM=()=>{if(!m.name.trim())return;const r={id:`r${Date.now()}`,name:m.name.trim(),tags:m.tags.split(",").map(t=>t.trim()).filter(Boolean),prep:m.prep,cook:m.cook,serves:parseInt(m.serves)||1,ingredients:m.ingredients.split("\n").filter(l=>l.trim()).map(line=>{const mt=line.trim().match(/^([\d½¼¾]+\s*(?:tbsp|tsp|cups?|g|kg|ml|bunch|handful|tin|cloves?)?\s*)(.*)/i);return mt?{q:mt[1].trim(),u:"",i:mt[2].trim()}:{q:"",u:"",i:line.trim()};}),steps:m.steps.split("\n").filter(l=>l.trim()),notes:m.notes,url:""};onSave([...recipes,r]);setSaved(true);setM({name:"",tags:"",prep:"",cook:"",serves:"1",ingredients:"",steps:"",notes:""});setTimeout(()=>setSaved(false),3000);};
  const inp={border:`1px solid ${LIGHT}`,borderRadius:"10px",padding:"10px 13px",color:DARK,fontFamily:"sans-serif",fontSize:"14px",outline:"none",width:"100%",display:"block",background:"#FFF"};
  return(<div style={{padding:"16px"}}>
    <h2 style={{color:DARK,fontSize:"22px",fontWeight:"bold",marginBottom:"4px"}}>Add a Recipe</h2>
    <p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",marginBottom:"13px"}}>From a URL, photo, pasted text, or type it in manually.</p>
    {saved&&<div style={{background:"#F0FAF4",border:"1px solid #B2DFCC",color:"#1A5C3C",borderRadius:"10px",padding:"11px 13px",fontFamily:"sans-serif",fontSize:"13px",marginBottom:"13px"}}>✅ Recipe saved!</div>}
    <div style={{display:"flex",gap:"6px",marginBottom:"16px"}}>
      {[{id:"url",l:"🔗 URL"},{id:"photo",l:"📷 Photo"},{id:"paste",l:"📋 Paste"},{id:"manual",l:"✏️ Manual"}].map(md=>(<button key={md.id} onClick={()=>setMode(md.id)} style={{flex:1,padding:"9px 4px",borderRadius:"20px",fontFamily:"sans-serif",fontSize:"12px",fontWeight:"600",cursor:"pointer",background:mode===md.id?TC:"#FFF",color:mode===md.id?"#FAF7F2":MED,border:`1px solid ${mode===md.id?TC:LIGHT}`}}>{md.l}</button>))}
    </div>
    {(mode==="url"||mode==="photo"||mode==="paste")&&(<div>
      {mode==="url"&&(<div style={{display:"flex",marginBottom:"11px"}}><input value={url} onChange={e=>{setUrl(e.target.value);setErr("");}} placeholder="Paste recipe URL here..." style={{...inp,flex:1,borderRadius:"10px 0 0 10px",borderRight:"none",width:"auto"}}/><button onClick={extract} disabled={loading||!url.trim()} style={{background:loading||!url.trim()?LIGHT:TC,color:"#FAF7F2",borderRadius:"0 10px 10px 0",padding:"10px 15px",fontFamily:"sans-serif",fontSize:"13px",cursor:loading||!url.trim()?"default":"pointer",flexShrink:0,border:"none",fontWeight:"600"}}>{loading?"⏳":"Go"}</button></div>)}
      {mode==="paste"&&(<div style={{marginBottom:"11px"}}><textarea value={pasteText} onChange={e=>{setPasteText(e.target.value);setErr("");}} placeholder={"Paste the recipe text here, straight from the caption, comment or description.\n\nIt doesn't need to be tidy — Claude will sort out the ingredients and steps."} rows={6} style={{...inp,resize:"none",marginBottom:"8px"}}/><button onClick={extractPaste} disabled={loading||!pasteText.trim()} style={{width:"100%",padding:"11px",borderRadius:"10px",background:loading||!pasteText.trim()?LIGHT:TC,color:loading||!pasteText.trim()?MED:"#FAF7F2",fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600",cursor:loading||!pasteText.trim()?"default":"pointer",border:"none"}}>{loading?"⏳ Extracting...":"Extract Recipe"}</button></div>)}
      {mode==="photo"&&(<div><input ref={photoRef} type="file" accept="image/*" capture="environment" onChange={e=>{if(e.target.files[0])extractPhoto(e.target.files[0]);}} style={{display:"none"}}/><button onClick={()=>photoRef.current.click()} disabled={loading} style={{width:"100%",borderRadius:"14px",padding:"26px 16px",border:`2px dashed ${LIGHT}`,background:CLIGHT,color:DARK,fontFamily:"sans-serif",fontSize:"14px",fontWeight:"600",cursor:"pointer",marginBottom:"11px",display:"flex",flexDirection:"column",alignItems:"center",gap:"7px"}}><span style={{fontSize:"34px"}}>📷</span><span>{loading?"Reading photo...":"Tap to photograph a recipe"}</span><span style={{color:MED,fontSize:"12px",fontWeight:"400"}}>Recipe card, cookbook, magazine — anything works</span></button></div>)}

function SwipeItem({children,onSwipe,borderBottom}){
  const ref=React.useRef(null);const startX=React.useRef(0);const curX=React.useRef(0);const swiping=React.useRef(false);
  const threshold=80;
  const onTouchStart=e=>{startX.current=e.touches[0].clientX;curX.current=0;swiping.current=false;const el=ref.current;if(el)el.style.transition="none";};
  const onTouchMove=e=>{const dx=e.touches[0].clientX-startX.current;if(dx>=0){curX.current=0;if(ref.current)ref.current.style.transform="translateX(0)";return;}curX.current=dx;swiping.current=Math.abs(dx)>10;if(ref.current)ref.current.style.transform=`translateX(${dx}px)`;};
  const onTouchEnd=()=>{const el=ref.current;if(!el)return;el.style.transition="transform 0.25s ease";if(curX.current<-threshold){el.style.transform=`translateX(-100%)`;setTimeout(onSwipe,200);}else{el.style.transform="translateX(0)";}};
  return React.createElement("div",{style:{position:"relative",overflow:"hidden",borderBottom}},
    React.createElement("div",{style:{position:"absolute",right:0,top:0,bottom:0,width:"100%",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:"18px",background:TC,color:"#FFF",fontFamily:"sans-serif",fontSize:"12px",fontWeight:"600"}},"Done ✓"),
    React.createElement("div",{ref,onTouchStart,onTouchMove,onTouchEnd,style:{position:"relative",zIndex:1,background:"#FFF"}},children)
  );
}

function ShoppingView({weekPlan,recipes}){
  const [hidden,setHidden]=useState(()=>load("mp_hidden_v3",{}));const [extra,setExtra]=useState("");const [extras,setExtras]=useState(()=>load("mp_extras_v3",[]));
  const hideItem=k=>{const h={...hidden,[k]:true};setHidden(h);save("mp_hidden_v3",h);};
  const addExtra=()=>{if(!extra.trim())return;const e=[...extras,extra.trim()];setExtras(e);save("mp_extras_v3",e);setExtra("");};
  const remExtra=i=>{const e=extras.filter((_,idx)=>idx!==i);setExtras(e);save("mp_extras_v3",e);};
  const restoreAll=()=>{setHidden({});save("mp_hidden_v3",{});};
  const allItems=[];const seen=new Set();
  DAYS.forEach(day=>{const plan=weekPlan[day.toLowerCase()]||{};MEALS.forEach(meal=>{const val=plan[meal];if(!val)return;const r=recipes.find(r=>r.id===val);if(!r?.ingredients)return;r.ingredients.forEach(ing=>{const k=(ing.i||"").toLowerCase().trim();if(k&&!seen.has(k)){seen.add(k);allItems.push({key:k,label:`${ing.q||""} ${ing.u||""} ${ing.i||""}`.trim().replace(/\s+/g," "),cat:categorize(ing.i||"")});}});});});
  [{key:"greek-yoghurt",label:"Greek yoghurt, full fat (large tub)",cat:"🧀 Dairy & Eggs"},{key:"eggs-12",label:"Eggs × 12",cat:"🧀 Dairy & Eggs"},{key:"frozen-berries",label:"Frozen berries (large bag)",cat:"❄️ Frozen"},{key:"bananas",label:"Bananas (bunch — freeze ripe ones)",cat:"🍎 Fruit"},{key:"baby-spinach",label:"Baby spinach (large bag)",cat:"🥬 Vegetables"},{key:"cherry-toms",label:"Cherry tomatoes (punnet)",cat:"🥬 Vegetables"},{key:"macadamias",label:"Macadamias (bench jar)",cat:"🥜 Snacks"},{key:"peanuts",label:"Peanuts",cat:"🥜 Snacks"},{key:"peanut-butter",label:"Peanut butter, natural",cat:"🥜 Snacks"},{key:"coke-zero",label:"Coke Zero (slab)",cat:"🥤 Drinks"},{key:"cheese",label:"Tasty/cheddar cheese (block)",cat:"🧀 Dairy & Eggs"},{key:"crackers",label:"Seeded crackers (box)",cat:"🥜 Snacks"},{key:"rice-cakes",label:"Rice cakes",cat:"🥜 Snacks"},{key:"boil-eggs",label:"Boil 4–5 eggs (Sunday prep ⭐)",cat:"🧀 Dairy & Eggs"}].forEach(s=>{if(!seen.has(s.key)){seen.add(s.key);allItems.push(s);}});
  extras.forEach((e,i)=>allItems.push({key:`x${i}`,label:e,cat:"🧂 Pantry",extra:true,extraIdx:i}));
  const visibleItems=allItems.filter(item=>!hidden[item.key]);
  const cats={};visibleItems.forEach(item=>{if(!cats[item.cat])cats[item.cat]=[];cats[item.cat].push(item);});
  const total=allItems.length;const remaining=visibleItems.length;const shopped=total-remaining;
  return(<div style={{padding:"16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"3px"}}><h2 style={{color:DARK,fontSize:"22px",fontWeight:"bold"}}>Shopping List</h2><div style={{display:"flex",alignItems:"center",gap:"10px"}}><span style={{color:MED,fontFamily:"sans-serif",fontSize:"12px"}}>{remaining} left</span>{shopped>0&&<button onClick={restoreAll} style={{color:TC,fontFamily:"sans-serif",fontSize:"12px",border:"none",cursor:"pointer",background:"none"}}>Restore all</button>}</div></div>
    <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginBottom:"10px"}}>From your week plan + weekly staples</p>
    <div style={{height:"5px",borderRadius:"4px",background:LIGHT,marginBottom:"13px",overflow:"hidden"}}><div style={{width:`${total?shopped/total*100:0}%`,height:"100%",background:TC,borderRadius:"4px",transition:"width 0.3s"}}/></div>
    <div style={{display:"flex",marginBottom:"16px"}}><input value={extra} onChange={e=>setExtra(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addExtra()} placeholder="Add extra item..." style={{flex:1,border:`1px solid ${LIGHT}`,borderRadius:"10px 0 0 10px",padding:"10px 13px",color:DARK,fontFamily:"sans-serif",fontSize:"13px",outline:"none",background:"#FFF"}}/><button onClick={addExtra} style={{background:TC,color:"#FAF7F2",borderRadius:"0 10px 10px 0",padding:"10px 15px",fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer",border:"none",fontWeight:"600"}}>Add</button></div>
    {Object.entries(cats).map(([cat,items])=>(<div key={cat} style={{marginBottom:"16px"}}>
      <h3 style={{color:DARK,fontFamily:"sans-serif",fontSize:"12px",fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:"7px"}}>{cat}</h3>
      <div style={{borderRadius:"13px",overflow:"hidden",background:"#FFF",border:`1px solid ${LIGHT}`}}>
        {items.map((item,i)=>(<SwipeItem key={item.key} onSwipe={()=>{if(item.extra){remExtra(item.extraIdx);}else{hideItem(item.key);}}} borderBottom={i<items.length-1?`1px solid ${LIGHT}`:"none"}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",padding:"11px 13px",background:"#FFF"}}>
            <span style={{flex:1,color:DARK,fontFamily:"sans-serif",fontSize:"13px"}}>{item.label}</span>
            <button onClick={()=>{if(item.extra){remExtra(item.extraIdx);}else{hideItem(item.key);}}} style={{color:MED,fontSize:"16px",border:"none",cursor:"pointer",padding:"0 4px",background:"none",flexShrink:0}}>×</button>
          </div>
        </SwipeItem>))}
      </div>
    </div>))}
  </div>);
}

        {currentVal&&<button onClick={()=>onSelect("")} style={{width:"100%",textAlign:"left",padding:"9px 13px",borderRadius:"10px",background:"#FEF2F2",border:"1px solid #FECACA",color:"#991B1B",fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer"}}>✕ Remove meal</button>}
        {filtered.map(r=>(<button key={r.id} onClick={()=>onSelect(r.id)} style={{width:"100%",textAlign:"left",padding:"11px 13px",borderRadius:"10px",cursor:"pointer",background:currentVal===r.id?CLIGHT:"#FFF",border:`1px solid ${currentVal===r.id?TC:LIGHT}`}}><p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600"}}>{r.name}</p><p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px"}}>{r.prep}m prep · Serves {r.serves}</p></button>))}
        {filtered.length===0&&<p style={{color:MED,fontFamily:"sans-serif",fontSize:"13px",textAlign:"center",padding:"16px"}}>No matching recipes. Add one in the ➕ tab.</p>}
      </div>
    </div>
  </div>);
}

function AIPlannerModal({recipes,apiKey,exclusions,onApply,onClose}){
  const [mode,setMode]=useState("choose");const [selected,setSelected]=useState([]);const [loading,setLoading]=useState(false);const [plan,setPlan]=useState(null);const [reasoning,setReasoning]=useState("");const [err,setErr]=useState("");
  const dinners=recipes.filter(r=>r.tags?.includes("dinner"));
  const toggle=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const generate=async()=>{
    setLoading(true);setPlan(null);setReasoning("");setErr("");
    const list=recipes.map(r=>({id:r.id,name:r.name,tags:r.tags||[],produces:r.produces||[],uses:r.uses||[]}));
    const excl=exclusions?.length?`Avoid recipes containing: ${exclusions.join(", ")}.`:"";
    const prompt=`Strategic meal planner. Maximise ingredient reuse, minimise waste.\n\nRecipes: ${JSON.stringify(list)}\n${excl}\n${mode==="choose"?`User wants these dinners: ${selected.map(id=>recipes.find(r=>r.id===id)?.name).filter(Boolean).join(", ")}. Choose breakfasts, snacks and lunches strategically.`:"Choose best 7 dinners and all meals for maximum ingredient reuse."}\n\nRULES: After s9 (curry, produces leftover rice) schedule s10 (egg fried rice) within 1-2 days. After s11 (roast chicken) use leftover chicken next day lunch. Vary proteins nightly. Snacks can be text like "Macadamias + cheese". Breakfasts can be text if no recipe fits.\n\nReturn ONLY raw JSON:\n{"plan":{"monday":{"breakfast":"","snack":"","lunch":"","dinner":""},"tuesday":{"breakfast":"","snack":"","lunch":"","dinner":""},"wednesday":{"breakfast":"","snack":"","lunch":"","dinner":""},"thursday":{"breakfast":"","snack":"","lunch":"","dinner":""},"friday":{"breakfast":"","snack":"","lunch":"","dinner":""},"saturday":{"breakfast":"","snack":"","lunch":"","dinner":""},"sunday":{"breakfast":"","snack":"","lunch":"","dinner":""}},"reasoning":"2 sentences on strategic ingredient reuse."}`;
    try{const t=await callClaude(prompt,apiKey);const c=t.replace(/```json|```/g,"").trim();const j=JSON.parse(c.slice(c.indexOf("{"),c.lastIndexOf("}")+1));setPlan(j.plan);setReasoning(j.reasoning||"");}catch(e){setErr("Couldn't generate — please try again.");}
    setLoading(false);
  };
  const getName=val=>{if(!val)return"—";const r=recipes.find(r=>r.id===val);return r?r.name:val;};
  return(<div onClick={onClose} style={{position:"fixed",inset:0,zIndex:50,background:"rgba(61,46,38,0.5)",display:"flex",alignItems:"flex-end"}}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:"600px",margin:"0 auto",borderRadius:"22px 22px 0 0",background:"#FFF",maxHeight:"92dvh",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",justifyContent:"center",padding:"10px 0 3px"}}><div style={{width:"36px",height:"4px",borderRadius:"2px",background:LIGHT}}/></div>
      <div style={{padding:"0 15px 13px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"3px"}}><h3 style={{color:DARK,fontSize:"19px",fontWeight:"bold"}}>✨ AI Meal Planner</h3><button onClick={onClose} style={{color:MED,fontSize:"24px",border:"none",cursor:"pointer",background:"none"}}>×</button></div>
        <p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginBottom:"11px"}}>Plans your week strategically — like Nicole's approach. Ingredient reuse built in.</p>
        {exclusions?.length>0&&<p style={{color:TC,fontFamily:"sans-serif",fontSize:"11px",marginBottom:"10px"}}>🚫 Avoiding: {exclusions.join(", ")}</p>}
        <div style={{display:"flex",gap:"6px"}}>{["choose","surprise"].map(md=>(<button key={md} onClick={()=>setMode(md)} style={{flex:1,padding:"9px",borderRadius:"20px",fontFamily:"sans-serif",fontSize:"12px",fontWeight:"700",cursor:"pointer",background:mode===md?TC:"#FFF",color:mode===md?"#FAF7F2":MED,border:`1px solid ${mode===md?TC:LIGHT}`}}>{md==="choose"?"I'll pick dinners":"🎲 Surprise me"}</button>))}</div>
      </div>
      <div style={{overflowY:"auto",flex:1,padding:"0 15px 13px",WebkitOverflowScrolling:"touch"}}>
        {mode==="choose"&&!plan&&!loading&&(<div style={{display:"flex",flexDirection:"column",gap:"5px"}}><p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginBottom:"7px"}}>Pick the dinners you'd like this week:</p>{dinners.map(r=>(<button key={r.id} onClick={()=>toggle(r.id)} style={{width:"100%",textAlign:"left",padding:"11px 13px",borderRadius:"10px",display:"flex",alignItems:"center",gap:"9px",cursor:"pointer",background:selected.includes(r.id)?CLIGHT:"#FFF",border:`1px solid ${selected.includes(r.id)?TC:LIGHT}`}}><div style={{width:"18px",height:"18px",borderRadius:"5px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${selected.includes(r.id)?TC:LIGHT}`,background:selected.includes(r.id)?TC:"transparent"}}>{selected.includes(r.id)&&<span style={{color:"#FFF",fontSize:"10px",fontWeight:"bold"}}>✓</span>}</div><div style={{flex:1,minWidth:0}}><p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"600"}}>{r.name}</p><p style={{color:MED,fontFamily:"sans-serif",fontSize:"11px"}}>{r.prep}m prep · Serves {r.serves}</p></div></button>))}</div>)}
        {loading&&<div style={{textAlign:"center",padding:"36px"}}><div style={{fontSize:"36px",marginBottom:"10px"}}>🧠</div><p style={{color:DARK,fontFamily:"sans-serif",fontSize:"14px",fontWeight:"600"}}>Planning your week...</p><p style={{color:MED,fontFamily:"sans-serif",fontSize:"12px",marginTop:"4px"}}>Thinking about ingredient reuse & variety</p></div>}
        {err&&<p style={{color:"#991B1B",fontFamily:"sans-serif",fontSize:"13px",textAlign:"center",padding:"13px"}}>{err}</p>}
        {plan&&!loading&&(<div>
          {reasoning&&<div style={{borderRadius:"13px",padding:"13px",background:CLIGHT,border:`1px solid ${LIGHT}`,marginBottom:"13px"}}><p style={{color:TC,fontFamily:"sans-serif",fontSize:"11px",textTransform:"uppercase",fontWeight:"700",letterSpacing:"0.06em",marginBottom:"5px"}}>🧠 Strategy</p><p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",lineHeight:"1.6"}}>{reasoning}</p></div>}
          <div style={{display:"flex",flexDirection:"column",gap:"6px",marginBottom:"13px"}}>{DAYS.map(day=>{const d=plan[day.toLowerCase()]||{};return(<div key={day} style={{borderRadius:"11px",padding:"11px 13px",background:"#FFF",border:`1px solid ${LIGHT}`}}><p style={{color:DARK,fontFamily:"sans-serif",fontSize:"13px",fontWeight:"700",marginBottom:"6px"}}>{day}</p>{MEALS.map(meal=>(<div key={meal} style={{display:"flex",gap:"6px",marginBottom:"3px"}}><span style={{color:MED,fontFamily:"sans-serif",fontSize:"10px",width:"54px",flexShrink:0,paddingTop:"1px"}}>{MLABEL[meal]}</span><span style={{color:DARK,fontFamily:"sans-serif",fontSize:"12px",flex:1,lineHeight:"1.4"}}>{getName(d[meal])}</span></div>))}</div>);})}</div>
          <div style={{display:"flex",gap:"7px"}}><button onClick={()=>onApply(plan)} style={{flex:1,padding:"12px",borderRadius:"20px",background:TC,color:"#FAF7F2",fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700",cursor:"pointer",border:"none"}}>Apply This Plan ✓</button><button onClick={()=>{setPlan(null);setReasoning("");}} style={{padding:"12px 16px",borderRadius:"20px",border:`1px solid ${LIGHT}`,color:MED,fontFamily:"sans-serif",fontSize:"13px",cursor:"pointer",background:"none"}}>Retry</button></div>
        </div>)}
      </div>
      {!plan&&!loading&&(<div style={{padding:"10px 15px 24px",borderTop:`1px solid ${LIGHT}`}}><button onClick={generate} disabled={mode==="choose"&&selected.length===0} style={{width:"100%",padding:"13px",borderRadius:"20px",background:mode==="choose"&&selected.length===0?LIGHT:TC,color:mode==="choose"&&selected.length===0?MED:"#FAF7F2",fontFamily:"sans-serif",fontSize:"14px",fontWeight:"700",cursor:mode==="choose"&&selected.length===0?"default":"pointer",border:"none"}}>{mode==="choose"?`Plan My Week${selected.length>0?` (${selected.length} dinners)`:""}`:"🎲 Plan My Week"}</button></div>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
